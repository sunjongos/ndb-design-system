<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body { margin:0; padding:0; background:var(--bg-surface); }
  .card { padding:20px 24px; font-family: var(--font-sans); display:flex; flex-direction:column; gap:10px; }
  .alert { display:flex; gap:12px; padding:12px 14px; border-radius:var(--radius-md); border:1px solid; align-items:flex-start; }
  .alert .icn { width:22px; height:22px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:#fff; font-size:13px; font-weight:700; flex:none; }
  .alert .ttl { font-size:14px; font-weight:600; color:var(--fg-1); margin-bottom:1px; }
  .alert .msg { font-size:13px; color:var(--fg-2); line-height:1.5; }
  .a-info    { background:var(--info-soft);    border-color:#BEE1F3; }
  .a-info .icn { background:var(--info); }
  .a-success { background:var(--success-soft); border-color:#CDE593; }
  .a-success .icn { background:var(--success); }
  .a-warn    { background:var(--warning-soft); border-color:#F9CF7F; }
  .a-warn .icn { background:var(--warning); }
  .a-danger  { background:var(--danger-soft);  border-color:#F1B9B9; }
  .a-danger .icn { background:var(--danger); }
</style></head><body><div class="card">
  <div class="alert a-info"><div class="icn">i</div><div><div class="ttl">진료 예약 알림</div><div class="msg">예약 2시간 전 문자로 안내드립니다.</div></div></div>
  <div class="alert a-success"><div class="icn">✓</div><div><div class="ttl">예약이 확정되었습니다</div><div class="msg">4월 24일(금) 오전 10:30 · 척추센터 김민수 과장</div></div></div>
  <div class="alert a-warn"><div class="icn">!</div><div><div class="ttl">수술 전 금식 안내</div><div class="msg">자정 12시 이후 음식 및 물 섭취를 피해 주세요.</div></div></div>
</div></body></html>
