<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body { margin:0; padding:0; background:var(--bg-surface); }
  .card { padding: 20px 24px; font-family: var(--font-sans); color: var(--fg-1); }
  .row { display:flex; gap:10px; flex-wrap:wrap; }
  .swatch { flex: 1 1 0; height:96px; border-radius:var(--radius-md); border:1px solid var(--border-subtle); padding:10px 12px; display:flex; flex-direction:column; justify-content:space-between; color:#fff; }
  .swatch .name { font-size:13px; font-weight:600; }
  .swatch .hex  { font-family:var(--font-mono); font-size:11px; opacity:.9; }
</style></head><body><div class="card"><div class="row">
  <div class="swatch" style="background:#FEF5E4"><div class="name" style="color:var(--fg-1)">Orange 50</div><div class="hex" style="color:var(--fg-2)">#FEF5E4</div></div>
  <div class="swatch" style="background:#F9CF7F"><div class="name" style="color:var(--fg-1)">Orange 200</div><div class="hex" style="color:var(--fg-1);opacity:.75">#F9CF7F</div></div>
  <div class="swatch" style="background:#F29D00"><div class="name">Orange 500 · Warmth</div><div class="hex">#F29D00</div></div>
  <div class="swatch" style="background:#A56A00"><div class="name">Orange 700</div><div class="hex">#A56A00</div></div>
  <div class="swatch" style="background:#4B3000"><div class="name">Orange 900</div><div class="hex">#4B3000</div></div>
</div></div></body></html>
