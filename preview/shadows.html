<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body { margin:0; padding:0; background:var(--bg-app); }
  .card { padding:28px 24px; font-family: var(--font-sans); }
  .row { display:flex; gap:18px; }
  .item { display:flex; flex-direction:column; gap:10px; align-items:center; flex:1; }
  .box { width:100%; height:64px; background:#fff; border-radius:var(--radius-lg); }
  .lbl { font-size:11px; color:var(--fg-3); font-family:var(--font-mono); }
</style></head><body><div class="card"><div class="row">
  <div class="item"><div class="box" style="box-shadow:var(--shadow-xs)"></div><div class="lbl">xs</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-sm)"></div><div class="lbl">sm</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-md)"></div><div class="lbl">md</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-lg)"></div><div class="lbl">lg</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-xl)"></div><div class="lbl">xl</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-brand)"></div><div class="lbl">brand</div></div>
</div></div></body></html>
