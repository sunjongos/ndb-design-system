<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body { margin:0; padding:0; background:var(--bg-surface); }
  .card { padding:20px 24px; font-family: var(--font-sans); }
  .row { display:flex; align-items:center; gap:12px; padding:3px 0; }
  .bar { background:var(--trust); height:10px; border-radius:2px; }
  .lbl { font-family:var(--font-mono); font-size:11px; color:var(--fg-3); width:80px; flex:none; }
</style></head><body><div class="card">
  <div class="row"><div class="lbl">1 · 4</div><div class="bar" style="width:4px"></div></div>
  <div class="row"><div class="lbl">2 · 8</div><div class="bar" style="width:8px"></div></div>
  <div class="row"><div class="lbl">3 · 12</div><div class="bar" style="width:12px"></div></div>
  <div class="row"><div class="lbl">4 · 16</div><div class="bar" style="width:16px"></div></div>
  <div class="row"><div class="lbl">6 · 24</div><div class="bar" style="width:24px"></div></div>
  <div class="row"><div class="lbl">8 · 32</div><div class="bar" style="width:32px"></div></div>
  <div class="row"><div class="lbl">12 · 48</div><div class="bar" style="width:48px"></div></div>
  <div class="row"><div class="lbl">16 · 64</div><div class="bar" style="width:64px"></div></div>
  <div class="row"><div class="lbl">20 · 80</div><div class="bar" style="width:80px"></div></div>
</div></body></html>
