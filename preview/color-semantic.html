<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body { margin:0; padding:0; background:var(--bg-surface); }
  .card { padding: 20px 24px; font-family: var(--font-sans); color: var(--fg-1); }
  .grid { display:grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .pill { display:flex; align-items:center; gap:12px; padding:12px 14px; border-radius:var(--radius-md); border:1px solid var(--border-subtle); }
  .dot { width:14px; height:14px; border-radius:50%; flex:none; }
  .label { font-size:13px; font-weight:600; }
  .hex { font-family:var(--font-mono); font-size:11px; color:var(--fg-3); margin-left:auto; }
</style></head><body><div class="card"><div class="grid">
  <div class="pill" style="background:var(--success-soft)"><span class="dot" style="background:var(--success)"></span><span class="label">Success</span><span class="hex">#7CA412</span></div>
  <div class="pill" style="background:var(--info-soft)"><span class="dot" style="background:var(--info)"></span><span class="label">Info</span><span class="hex">#0087B6</span></div>
  <div class="pill" style="background:var(--warning-soft)"><span class="dot" style="background:var(--warning)"></span><span class="label">Warning</span><span class="hex">#F29D00</span></div>
  <div class="pill" style="background:var(--danger-soft)"><span class="dot" style="background:var(--danger)"></span><span class="label">Danger</span><span class="hex">#D14343</span></div>
</div></div></body></html>
