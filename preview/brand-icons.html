<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  html,body { margin:0; padding:0; background:var(--bg-surface); }
  .card { padding:20px 24px; font-family: var(--font-sans); }
  .grid { display:grid; grid-template-columns:repeat(8, 1fr); gap:10px; }
  .ico { display:flex; flex-direction:column; align-items:center; gap:6px; padding:10px 0; border-radius:var(--radius-sm); color:var(--fg-2); }
  .ico i[data-lucide] { width:24px; height:24px; }
  .lbl { font-size:10px; color:var(--fg-3); }
  .note { margin-top:12px; font-size:12px; color:var(--fg-3); }
</style></head><body><div class="card">
  <div class="grid">
    <div class="ico"><i data-lucide="calendar-days"></i><div class="lbl">appointment</div></div>
    <div class="ico"><i data-lucide="stethoscope"></i><div class="lbl">doctor</div></div>
    <div class="ico"><i data-lucide="heart-pulse"></i><div class="lbl">vitals</div></div>
    <div class="ico"><i data-lucide="clipboard-list"></i><div class="lbl">chart</div></div>
    <div class="ico"><i data-lucide="pill"></i><div class="lbl">medication</div></div>
    <div class="ico"><i data-lucide="syringe"></i><div class="lbl">injection</div></div>
    <div class="ico"><i data-lucide="activity"></i><div class="lbl">activity</div></div>
    <div class="ico"><i data-lucide="shield-check"></i><div class="lbl">insurance</div></div>
    <div class="ico"><i data-lucide="phone"></i><div class="lbl">call</div></div>
    <div class="ico"><i data-lucide="map-pin"></i><div class="lbl">location</div></div>
    <div class="ico"><i data-lucide="clock"></i><div class="lbl">hours</div></div>
    <div class="ico"><i data-lucide="user-round"></i><div class="lbl">patient</div></div>
    <div class="ico"><i data-lucide="bell"></i><div class="lbl">notify</div></div>
    <div class="ico"><i data-lucide="file-text"></i><div class="lbl">record</div></div>
    <div class="ico"><i data-lucide="search"></i><div class="lbl">search</div></div>
    <div class="ico"><i data-lucide="menu"></i><div class="lbl">menu</div></div>
  </div>
  <div class="note">Lucide · stroke 1.75 · rounded caps · currentColor</div>
  <script>lucide.createIcons({ attrs: { 'stroke-width': 1.75 } });</script>
</div></body></html>
