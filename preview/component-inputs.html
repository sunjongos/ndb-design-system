<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body { margin:0; padding:0; background:var(--bg-surface); }
  .card { padding:22px 24px; font-family: var(--font-sans); display:grid; grid-template-columns:1fr 1fr; gap:14px 18px; }
  .field label { display:block; font-size:13px; font-weight:600; color:var(--fg-1); margin-bottom:6px; }
  .field .hint { font-size:12px; color:var(--fg-3); margin-top:4px; }
  .field .err  { font-size:12px; color:var(--danger); margin-top:4px; }
  .input { width:100%; box-sizing:border-box; font-family:inherit; font-size:15px; padding:11px 12px; border:1px solid var(--border-default); border-radius:var(--radius-sm); background:#fff; color:var(--fg-1); outline:none; transition: border-color var(--dur-base), box-shadow var(--dur-base); }
  .input::placeholder { color:var(--fg-4); }
  .input:focus { border-color:var(--border-focus); box-shadow:var(--shadow-focus); }
  .input.err { border-color:var(--danger); }
  .input.err:focus { box-shadow:var(--shadow-focus-err); }
</style></head><body><div class="card">
  <div class="field">
    <label>이름 · Full name</label>
    <input class="input" placeholder="홍길동"/>
    <div class="hint">실명을 입력해 주세요.</div>
  </div>
  <div class="field">
    <label>주민등록번호 앞 6자리</label>
    <input class="input" value="920518" style="font-family:var(--font-mono); letter-spacing:2px"/>
  </div>
  <div class="field">
    <label>진료과 · Department</label>
    <select class="input"><option>척추센터 (Spine)</option><option>관절센터 (Joint)</option></select>
  </div>
  <div class="field">
    <label>연락처</label>
    <input class="input err" value="010-"/>
    <div class="err">휴대전화 번호 11자리를 입력해 주세요.</div>
  </div>
</div></body></html>
