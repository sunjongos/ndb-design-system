<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body { margin:0; padding:0; background:var(--bg-surface); }
  .card { padding:22px 24px; font-family: var(--font-sans); }
  .row { display:flex; gap:14px; align-items:flex-end; }
  .item { display:flex; flex-direction:column; gap:8px; align-items:center; }
  .box { width:72px; height:72px; background:var(--trust-soft); border:1px solid var(--border-subtle); }
  .lbl { font-size:11px; color:var(--fg-3); font-family:var(--font-mono); }
</style></head><body><div class="card"><div class="row">
  <div class="item"><div class="box" style="border-radius:var(--radius-xs)"></div><div class="lbl">xs · 4</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-sm)"></div><div class="lbl">sm · 6</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-md)"></div><div class="lbl">md · 8</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-lg)"></div><div class="lbl">lg · 12</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-xl)"></div><div class="lbl">xl · 16</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-2xl)"></div><div class="lbl">2xl · 20</div></div>
  <div class="item"><div class="box" style="border-radius:999px"></div><div class="lbl">pill</div></div>
</div></div></body></html>
