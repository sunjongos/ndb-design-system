<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body { margin:0; padding:0; background:var(--bg-surface); }
  .card { padding:20px 24px; font-family: var(--font-sans); }
  .fam { font-size:13px; color:var(--fg-3); font-family:var(--font-mono); margin-bottom:8px; }
  .row { display:flex; align-items:baseline; gap:14px; padding:6px 0; }
  .meta { font-family: var(--font-mono); font-size:11px; color:var(--fg-3); width:72px; flex:none; }
  .sample { font-size: 22px; letter-spacing:-0.01em; }
</style></head><body><div class="card">
  <div class="fam">Pretendard Variable · KR + Latin · fallback Noto Sans KR</div>
  <div class="row"><div class="meta">400</div><div class="sample" style="font-weight:400">Namyangju Baek · 남양주백병원</div></div>
  <div class="row"><div class="meta">500</div><div class="sample" style="font-weight:500">Namyangju Baek · 남양주백병원</div></div>
  <div class="row"><div class="meta">600</div><div class="sample" style="font-weight:600">Namyangju Baek · 남양주백병원</div></div>
  <div class="row"><div class="meta">700</div><div class="sample" style="font-weight:700">Namyangju Baek · 남양주백병원</div></div>
  <div class="row"><div class="meta">800</div><div class="sample" style="font-weight:800">Namyangju Baek · 남양주백병원</div></div>
</div></body></html>
