<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body { margin:0; padding:0; background:var(--bg-surface); }
  .card { padding:20px 24px; font-family: var(--font-sans); display:flex; gap:22px; align-items:center; justify-content:space-between; }
  .tile { display:flex; flex-direction:column; align-items:center; gap:8px; flex:1; }
  .lbl { font-size:11px; color:var(--fg-3); font-family:var(--font-mono); }
  .dark { background:var(--ndb-neutral-900); border-radius:var(--radius-md); padding:16px; display:flex; justify-content:center; }
</style></head><body><div class="card">
  <div class="tile">
    <img src="../assets/logo-ndb-official.png" width="260" alt="NDB logo"/>
    <div class="lbl">Official · PNG</div>
  </div>
  <div class="tile">
    <img src="../assets/logo-ndb-compact.svg" width="120" alt="ndb"/>
    <div class="lbl">Lettermark</div>
  </div>
  <div class="tile">
    <img src="../assets/favicon.svg" width="48" height="48" alt="favicon"/>
    <div class="lbl">Favicon</div>
  </div>
</div></body></html>
